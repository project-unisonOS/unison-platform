name: Supported runtime contract

on:
  push:
    paths:
      - "compose/compose.supported.yaml"
      - "releases/supported-images.example.env"
      - "releases/supported-host-requirements.json"
      - "releases/supported-licenses.json"
      - "model-packs/alpha/default.json"
      - "installer/bootstrap.py"
      - "installer/release_bundle.py"
      - "installer/transaction.py"
      - "installer/update_transaction.py"
      - "scripts/assemble_supported_bundle.py"
      - "scripts/generate_supported_manifest.py"
      - "scripts/test_supported_bundle.py"
      - "scripts/test_supported_manifest.py"
      - "scripts/test_installer_transactions.py"
      - "scripts/test_update_transaction.py"
      - "scripts/validate-supported-runtime.py"
      - ".github/workflows/supported-runtime.yml"
  pull_request:
    paths:
      - "compose/compose.supported.yaml"
      - "releases/supported-images.example.env"
      - "releases/supported-host-requirements.json"
      - "releases/supported-licenses.json"
      - "model-packs/alpha/default.json"
      - "installer/bootstrap.py"
      - "installer/release_bundle.py"
      - "installer/transaction.py"
      - "installer/update_transaction.py"
      - "scripts/assemble_supported_bundle.py"
      - "scripts/generate_supported_manifest.py"
      - "scripts/test_supported_bundle.py"
      - "scripts/test_supported_manifest.py"
      - "scripts/test_installer_transactions.py"
      - "scripts/test_update_transaction.py"
      - "scripts/validate-supported-runtime.py"
      - ".github/workflows/supported-runtime.yml"

permissions:
  contents: read

jobs:
  static-contract:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Validate digest and exposure contract
        run: ./scripts/validate-supported-runtime.py
      - name: Validate deterministic release manifest
        run: ./scripts/test_supported_manifest.py
      - name: Simulate installer preflight matrix
        run: ./scripts/test_installer_preflight.py
      - name: Simulate installer transactions and interruption
        run: ./scripts/test_installer_transactions.py
      - name: Verify signed release bundle and bootstrap contract
        run: ./scripts/test_supported_bundle.py
      - name: Simulate verified update activation and rollback
        run: ./scripts/test_update_transaction.py
